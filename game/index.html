<!DOCTYPE html>
<html>
<head>
<title>Grog</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" type="image/png" href="/grog-favicon.png">
<link rel="apple-touch-icon" href="/grog-favicon.png">
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        /* Prevent text selection and touch callouts on mobile */
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
        touch-action: none;
    }
    canvas {
        display: block;
        width: 100%;
        height: 100%;
        /* Prevent default touch behaviors */
        touch-action: none;
    }
    /* Safe area handling for notch/dynamic island */
    @supports (padding: env(safe-area-inset-top)) {
        body {
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }
    }
    /* Portrait mode warning overlay - only on mobile */
    #rotate-notice {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000;
        z-index: 9999;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        text-align: center;
        padding: 20px;
    }
    #rotate-notice .icon {
        font-size: 64px;
        margin-bottom: 20px;
        animation: rotate-hint 2s ease-in-out infinite;
    }
    #rotate-notice .message {
        font-size: 18px;
        color: #aab;
    }
    @keyframes rotate-hint {
        0%, 100% { transform: rotate(0deg); }
        25% { transform: rotate(-15deg); }
        75% { transform: rotate(15deg); }
    }
    /* Show on mobile portrait only */
    @media screen and (max-width: 900px) and (orientation: portrait) {
        #rotate-notice {
            display: flex;
        }
    }
</style>
</head>
<body>
<div id="rotate-notice">
    <div class="icon">📱</div>
    <div class="message">Please rotate your device to landscape mode</div>
</div>
<script src="src/main.js" type="module"></script>
</body>
</html>
